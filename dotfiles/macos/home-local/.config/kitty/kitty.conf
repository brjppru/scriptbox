#
# brjed@kitty conf
#

# 2024.04.25 Woman That Rolls
# 2024.07.10 other fixes
# 2024.07.11 kitty +list-fonts --psnames
# 2024.07.12 fix font names selector
# 2025.10.17 move bar to the top
# 2025.12.26 add brj-gruvbox-dark.conf
# 2026.01.26 session: shell_integration enabled for cursor restore
# 2026.03.15 cleanup for kitty 0.40 dark-only: fix font_features, term, clipboard, tabs, titlebar, scrollback
# 2026.03.15 align shell_integration with zsh + starship no-cursor prompt behavior

# begin

font_family JetBrainsMono Nerd Font Mono
font_features JetBrainsMonoNFM-Regular +zero
font_features JetBrainsMonoNFM-Bold +zero
font_features JetBrainsMonoNFM-Italic +zero
font_features JetBrainsMonoNFM-BoldItalic +zero
font_size 18.0

window_padding_width 10

cursor_shape block
cursor_blink_interval 0.5
cursor_shape_unfocused hollow

scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 64
scrollback_lines 10000

url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
underline_hyperlinks hover

copy_on_select clipboard

enable_audio_bell yes
bell_on_tab " 🔔 "

tab_bar_edge top
tab_bar_background none
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_powerline_style slanted
tab_title_max_length 12
tab_title_template "{tab.last_focused_progress_percent}{title}"
active_tab_font_style bold-italic

term xterm-kitty
sync_to_monitor yes

shell_integration enabled no-cursor
update_check_interval 0

confirm_os_window_close -1
notify_on_cmd_finish always

hide_window_decorations no

map cmd+shift+up neighboring_window up
map cmd+shift+left neighboring_window left
map cmd+shift+right neighboring_window right
map cmd+shift+down neighboring_window down

include brj-gruvbox-dark.conf
